name: oo-system CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  oo-proto:
    name: oo-proto (shared C types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build toolchain
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Build oo-proto
        run: make -C shared/oo-proto
      - name: Test oo-proto
        run: make -C shared/oo-proto test

  oo-cli:
    name: oo CLI (interface/cli)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build toolchain
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Build oo CLI
        run: make -C interface/cli
      - name: Test oo CLI
        run: make -C interface/cli test
      - name: oo help
        run: ./interface/cli/build/oo help

  validate-scripts:
    name: Validate shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck scripts/bootstrap.sh scripts/status.sh scripts/build-all.sh
