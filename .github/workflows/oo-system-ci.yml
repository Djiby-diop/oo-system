name: oo-system CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  oo-proto:
    name: oo-proto (shared types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-proto-${{ hashFiles('shared/oo-proto/Cargo.toml') }}
      - name: cargo check (no_std)
        working-directory: shared/oo-proto
        run: cargo check
      - name: cargo check (std feature)
        working-directory: shared/oo-proto
        run: cargo check --features std

  oo-cli:
    name: oo CLI (interface/cli)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-cli-${{ hashFiles('interface/cli/Cargo.toml') }}
      - name: cargo build
        working-directory: interface/cli
        run: cargo build
      - name: cargo test
        working-directory: interface/cli
        run: cargo test
      - name: oo help
        working-directory: interface/cli
        run: cargo run -- help

  validate-scripts:
    name: Validate shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck scripts/bootstrap.sh scripts/status.sh scripts/build-all.sh
